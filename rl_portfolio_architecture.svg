<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="30" text-anchor="middle" fill="#3d3d3a">RL portfolio framework</text>

<!-- Data layer -->
<g><rect x="40" y="50" width="600" height="60" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="75" text-anchor="middle" fill="#444441">Price DataFrame (days × 100 stocks)</text>
<text font-family="sans-serif" font-size="12" x="340" y="93" text-anchor="middle" fill="#5F5E5A">features.py: RSI, MACD, Bollinger, momentum, volatility, cross-sectional rank</text></g>

<line x1="340" y1="110" x2="340" y2="140" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Environment -->
<g><rect x="130" y="140" width="420" height="70" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="167" text-anchor="middle" fill="#085041">Portfolio environment</text>
<text font-family="sans-serif" font-size="12" x="340" y="187" text-anchor="middle" fill="#0F6E56">State → stock features + market features + current weights</text></g>

<line x1="250" y1="210" x2="170" y2="260" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="430" y1="210" x2="510" y2="260" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="195" y="232" text-anchor="middle" fill="#888780">state</text>
<text font-family="sans-serif" font-size="12" x="485" y="232" text-anchor="middle" fill="#888780">state</text>

<!-- Actor -->
<g><rect x="40" y="260" width="260" height="80" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="170" y="287" text-anchor="middle" fill="#3C3489">Actor (policy)</text>
<text font-family="sans-serif" font-size="12" x="170" y="305" text-anchor="middle" fill="#534AB7">Cross-asset attention</text>
<text font-family="sans-serif" font-size="12" x="170" y="321" text-anchor="middle" fill="#534AB7">→ MLP → Gaussian dist</text></g>

<!-- Critic -->
<g><rect x="380" y="260" width="260" height="80" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="510" y="287" text-anchor="middle" fill="#0C447C">Critic (value)</text>
<text font-family="sans-serif" font-size="12" x="510" y="305" text-anchor="middle" fill="#185FA5">Cross-asset attention</text>
<text font-family="sans-serif" font-size="12" x="510" y="321" text-anchor="middle" fill="#185FA5">→ MLP → V(s)</text></g>

<line x1="170" y1="340" x2="170" y2="380" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="185" y="365" text-anchor="start" fill="#888780">portfolio weights</text>

<!-- Action processing -->
<g><rect x="60" y="380" width="220" height="52" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="170" y="400" text-anchor="middle" fill="#712B13">Action processing</text>
<text font-family="sans-serif" font-size="12" x="170" y="416" text-anchor="middle" fill="#993C1D">Softmax or tanh + constraints</text></g>

<path d="M170 432 L170 460 L340 460 L340 210" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="260" y="455" text-anchor="middle" fill="#888780">rebalance</text>

<!-- PPO Update -->
<g><rect x="380" y="380" width="260" height="52" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="510" y="400" text-anchor="middle" fill="#633806">PPO update</text>
<text font-family="sans-serif" font-size="12" x="510" y="416" text-anchor="middle" fill="#854F0B">Clipped objective + GAE</text></g>

<path d="M550 210 L620 240 L620 406" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<text font-family="sans-serif" font-size="12" x="632" y="310" text-anchor="start" fill="#888780">reward</text>

<line x1="445" y1="380" x2="270" y2="340" stroke="#854F0B" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>
<line x1="510" y1="380" x2="510" y2="340" stroke="#854F0B" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>
<text font-family="sans-serif" font-size="12" x="370" y="360" text-anchor="middle" fill="#854F0B">∇θ</text>
<text font-family="sans-serif" font-size="12" x="525" y="365" text-anchor="start" fill="#854F0B">∇φ</text>

<!-- Legend -->
<g><rect x="40" y="475" width="600" height="36" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="340" y="497" text-anchor="middle" fill="#5F5E5A">Reward: Sharpe ratio | MSE vs benchmark | Combined (Sharpe − drawdown penalty − turnover penalty)</text></g>
</svg>